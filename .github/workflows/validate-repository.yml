name: Validate repository structure

on:
  push:

jobs:
  validate-structure:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # This placeholder validation keeps the repository layout stable until source compilation is introduced.
      - name: Confirm required repository paths
        shell: bash
        run: |
          set -euo pipefail

          required_directories=(
            assets
            assets/css
            assets/images
            assets/images/recipes
            assets/js
            data
            data/ingredients
            data/recipes
            pages
            recipemanager
            recipemanager/assets
            recipemanager/assets/css
            recipemanager/assets/js
            recipemanager/pages
            source
            source/images
            source/recipes
          )

          required_files=(
            index.html
            recipemanager/index.html
            recipemanager/local_server.py
            source/ingredients.yml
          )

          for directory in "${required_directories[@]}"; do
            test -d "$directory"
          done

          for file in "${required_files[@]}"; do
            test -f "$file"
          done

          echo "Repository structure validated successfully."

      - name: Validate data and local server
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Verify generated recipe pages are current
        run: |
          python3 tools/generate_static_recipes.py
          git diff --exit-code -- recipes sitemap.xml

  browser-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install browser test dependencies
        run: npm install
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Run responsive and accessibility tests
        run: npm run test:e2e
