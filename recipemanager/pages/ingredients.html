<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ingredients | Recipe Manager</title>

    <link rel="stylesheet" href="../assets/css/style.css">

</head>

<body>

<div class="app">

    <aside class="sidebar">

        <div class="brand">
            <img class="brand-logo"
                 src="../../assets/images/logo.jpg"
                 alt="Will's Grill" width="700" height="350">
            <span>Recipe Manager</span>

        </div>

        <nav>

            <a href="../index.html">Dashboard</a>

            <a href="recipes.html">Recipes</a>

            <a href="ingredients.html" class="active" aria-current="page">Ingredients</a>

            <a href="export.html">Export</a>

        </nav>

    </aside>

    <main class="content">

        <header class="page-header">

            <div>

                <h1>Ingredients</h1>

                <p>Manage all ingredients used by recipes.</p>

            </div>

            <button id="newIngredientButton"
                    class="primary-button">

                + New Ingredient

            </button>

        </header>

        <div class="toolbar">

            <label class="visually-hidden" for="ingredientSearch">Search ingredients</label>
            <input id="ingredientSearch" class="table-search" type="search" placeholder="Search ingredients...">
            <label class="visually-hidden" for="ingredientCategoryFilter">Filter by category</label>
            <select id="ingredientCategoryFilter" class="table-filter">
                <option value="">All categories</option>
            </select>
            <label class="visually-hidden" for="ingredientSort">Sort ingredients</label>
            <select id="ingredientSort" class="table-filter">
                <option value="name-asc">Name A–Z</option>
                <option value="name-desc">Name Z–A</option>
                <option value="id-asc">ID ascending</option>
                <option value="id-desc">ID descending</option>
                <option value="category-asc">Category A–Z</option>
            </select>
            <button id="exportIngredientsButton" class="secondary-button">Download backup</button>

        </div>

        <table class="recipe-table">

            <caption class="visually-hidden">Ingredients available to edit</caption>

            <thead>

                <tr>

                    <th>ID</th>

                    <th>Name</th>

                    <th>Category</th>

                    <th>Unit</th>

                    <th>Treat marker</th>

                    <th>Actions</th>

                </tr>

            </thead>

            <tbody id="ingredientTable">

            </tbody>

        </table>

    </main>

</div>

<aside id="ingredientEditorPanel" class="editor-panel" role="dialog" aria-modal="true" aria-labelledby="ingredientEditorTitle" aria-hidden="true">
    <div class="editor-header">
        <h2 id="ingredientEditorTitle">Edit Ingredient</h2>
        <button id="closeIngredientEditor" type="button" aria-label="Close ingredient editor">Close</button>
    </div>
    <div class="editor-body">
        <div id="ingredientEditorContent">
            <p>Select an ingredient to begin editing.</p>
        </div>
    </div>
</aside>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/ingredients.js"></script>

</body>

</html>
