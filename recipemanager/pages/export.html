<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Export | Recipe Manager</title>

    <link rel="stylesheet" href="../assets/css/style.css">

</head>

<body>

<div class="app">

    <aside class="sidebar">

        <div class="brand">
            <img class="brand-logo"
                 src="../../assets/images/logo.jpg"
                 alt="Will's Grill" width="700" height="350">
            <span>Recipe Manager</span>
        </div>

        <nav>
            <a href="../index.html">Dashboard</a>
            <a href="recipes.html">Recipes</a>
            <a href="ingredients.html">Ingredients</a>
            <a href="export.html" class="active" aria-current="page">Export</a>
        </nav>

    </aside>

    <main class="content">

        <header class="page-header">
            <div>
                <h1>Export</h1>
                <p>Validate and save the current website data to the repository.</p>
            </div>
        </header>

        <section class="card package-card">
            <div class="package-summary">
                <div>
                    <h3>Ready to export</h3>
                    <p id="packageSummary">Loading current website data...</p>
                </div>
                <div class="package-actions">
                    <button id="refreshDataButton" type="button" class="secondary-button">Discard local changes</button>
                    <button id="saveRepositoryButton" type="button" class="primary-button" disabled>Save to repository</button>
                </div>
            </div>
            <p id="packageStatus" class="editor-feedback" aria-live="polite"></p>
        </section>

    </main>

</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/export.js"></script>

</body>

</html>
