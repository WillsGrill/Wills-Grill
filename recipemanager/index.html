<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Recipe Manager</title>

    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<div class="app">

    <aside class="sidebar">

        <div class="brand">
            <img class="brand-logo"
                 src="../assets/images/logo.jpg"
                 alt="Will's Grill">

        </div>

        <nav>

            <a href="index.html" class="active">
                Dashboard
            </a>

            <a href="pages/recipes.html">
                Recipes
            </a>

            <a href="pages/ingredients.html">
                Ingredients
            </a>

            <a href="pages/export.html">

        </nav>

    </aside>

        <header>

            <p>

        <section class="dashboard-grid">

                <div class="stat" id="recipeCount">

            </a>

            <a href="pages/ingredients.html" class="card">

                <h3>Ingredients</h3>
