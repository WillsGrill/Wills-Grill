<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Browse Recipes | Will's Grill</title>
    <meta name="description" content="Browse easy, healthy, high-protein recipes and add them to a combined Will's Grill shopping list.">
    <meta property="og:title" content="Browse Recipes | Will's Grill">
    <meta property="og:description" content="Choose healthy, simple recipes and create one combined shopping list.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://willsgrill.github.io/Wills-Grill/assets/images/homepage-hero-image.webp">
    <link rel="canonical" href="https://willsgrill.github.io/Wills-Grill/pages/browse.html">

    <link rel="icon" href="../favicon.svg" type="image/svg+xml">

    <link rel="stylesheet" href="../assets/css/style.css?v=1.8">

</head>

<body>

<a class="skip-link button" href="#main-content">Skip to main content</a>

<header>

    <div class="wrapper header-inner">

        <a href="../index.html" class="brand">

            <img src="../assets/images/logo.webp"
                 alt="Will's Grill"
                 width="700" height="350"
                 class="brand-logo">

            <div class="logo-tagline">

    <span class="tagline-white">
        Healthy food.
    </span>

    <span class="tagline-gold">
        Simple cooking.
    </span>

</div>

        </a>

        <nav>

            <a href="../index.html">Home</a>

            <a href="browse.html" aria-current="page">Browse Recipes</a>

            <a href="shopping-list.html">Shopping List</a>

            <a href="mealpack.html">Create Meal Pack</a>

        </nav>

    </div>

</header>

<main id="main-content" class="wrapper section">

    <div class="page-heading-row">

        <div>

            <h1>Browse Recipes</h1>

            <p class="mt-2">

                Select recipes you'd like to cook this week.

            </p>

        </div>

    </div>

    <aside class="selected-recipes-card" aria-labelledby="browseSelectedRecipesTitle">
        <div class="selected-recipes-heading">
            <div class="selected-recipes-title">
                <h3 id="browseSelectedRecipesTitle">Selected Recipes</h3>
                <span class="selected-recipe-count" aria-label="Selected recipe portions">0</span>
            </div>
            <button id="clearShopping" class="selected-recipes-clear">Clear</button>
        </div>
        <div class="selected-recipe-list" data-selected-recipes>No recipes selected.</div>
    </aside>

    <div class="search browse-filters">

        <label class="visually-hidden" for="searchBox">Search recipes</label>
        <input
            id="searchBox"
            type="text"
            placeholder="Search recipes..."
        >

        <label>
            <span>Protein Source</span>
            <select id="categoryFilter">
                <option value="">All protein sources</option>
                <option>Beef</option><option>Chicken</option><option>Fish</option><option>Pork</option><option>Turkey</option><option>Vegetarian</option><option>Venison</option>
            </select>
        </label>
        <label>
            <span>Maximum time</span>
            <select id="timeFilter"><option value="">Any time</option><option value="30">30 minutes</option><option value="45">45 minutes</option><option value="60">60 minutes</option></select>
        </label>
        <label>
            <span>Difficulty</span>
            <select id="difficultyFilter"><option value="">Any difficulty</option><option value="Easy">Easy</option><option value="Medium">Medium</option><option value="Hard">Hard</option></select>
        </label>

    </div>

    <div id="recipeList" class="recipe-grid" aria-live="polite">

        <!-- Recipes generated by JavaScript -->

    </div>

</main>

<footer>

    <div class="wrapper">

        <p>© Will's Grill</p>

    </div>

</footer>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/recipes.js?v=1.12"></script>
<script src="../assets/js/shopping.js?v=1.4"></script>
<script src="../assets/js/ui.js"></script>
<script src="../assets/js/app.js?v=1.1"></script>


</body>

</html>
