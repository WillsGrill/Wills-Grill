<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Browse Recipes | Will's Grill</title>
    <meta name="description" content="Browse easy, healthy, high-protein recipes and add them to a combined Will's Grill shopping list.">
    <meta property="og:title" content="Browse Recipes | Will's Grill">
    <meta property="og:description" content="Choose healthy, simple recipes and create one combined shopping list.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://willsgrill.github.io/Wills-Grill/assets/images/homepage-hero-image.jpg">
    <link rel="canonical" href="https://willsgrill.github.io/Wills-Grill/pages/browse.html">

    <link rel="icon" href="../favicon.svg" type="image/svg+xml">

    <link rel="stylesheet" href="../assets/css/style.css?v=1.7">

</head>

<body>

<header>

    <div class="wrapper header-inner">

        <a href="../index.html" class="brand">

            <img src="../assets/images/logo.jpg"
                 alt="Will's Grill"
                 width="700" height="350"
                 class="brand-logo">

            <div class="logo-tagline">

    <span class="tagline-white">
        Healthy food.
    </span>

    <span class="tagline-gold">
        Simple cooking.
    </span>

</div>

        </a>

        <nav>

            <a href="../index.html">Home</a>

            <a href="browse.html" aria-current="page">Browse Recipes</a>

            <a href="shopping-list.html">Shopping List</a>

            <a href="mealpack.html">Create Meal Pack</a>

        </nav>

    </div>

</header>

<main class="wrapper section">

    <div class="page-heading-row">

        <div>

            <h1>Browse Recipes</h1>

            <p class="mt-2">

                Select recipes you'd like to cook this week.

            </p>

        </div>

        <button id="clearShopping" class="button button-outline">

            Clear Selection

        </button>

    </div>

    <div class="search browse-filters">

        <label class="visually-hidden" for="searchBox">Search recipes</label>
        <input
            id="searchBox"
            type="text"
            placeholder="Search recipes..."
        >

        <label>
            <span>Category</span>
            <select id="categoryFilter">
                <option value="">All categories</option>
                <option>BBQ</option><option>Chicken</option><option>Fish</option><option>Turkey</option><option>Vegetarian</option>
            </select>
        </label>
        <label>
            <span>Maximum time</span>
            <select id="timeFilter"><option value="">Any time</option><option value="30">30 minutes</option><option value="45">45 minutes</option><option value="60">60 minutes</option></select>
        </label>
        <label>
            <span>Minimum protein</span>
            <select id="proteinFilter"><option value="">Any amount</option><option value="25">25 g</option><option value="35">35 g</option><option value="45">45 g</option></select>
        </label>

    </div>

    <div id="recipeList" class="recipe-grid" aria-live="polite">

        <!-- Recipes generated by JavaScript -->

    </div>

</main>

<footer>

    <div class="wrapper">

        <p>© Will's Grill</p>

    </div>

</footer>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/recipes.js?v=1.1"></script>
<script src="../assets/js/shopping.js?v=1.2"></script>
<script src="../assets/js/ui.js"></script>
<script src="../assets/js/app.js?v=1.1"></script>


</body>

</html>
